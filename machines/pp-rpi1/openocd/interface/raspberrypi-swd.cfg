# Raspberry Pi 3B+ GPIO-backed SWD adapter for OpenOCD.
# Pins follow the upstream bcm2835gpio examples:
# GPIO11 = SWCLK, GPIO25 = SWDIO, GPIO18 = nSRST.

adapter driver bcm2835gpio
transport select swd

adapter gpio swclk 11
adapter gpio swdio 25
adapter gpio srst 18 -pull-up

adapter speed 1000

reset_config srst_only srst_push_pull
