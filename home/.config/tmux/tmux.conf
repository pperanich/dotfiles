# set -g default-terminal screen-256color
# set -g default-terminal alacritty
# set -ag terminal-overrides ",alacritty:RGB"
set -g default-terminal xterm-ghostty
set -g set-clipboard on

unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

unbind r
bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf

# renumber windows when a window is closed
set -g renumber-windows on
# set terminal title
set -g set-titles on
# slightly longer pane indicators display time
set -g display-panes-time 800
# slightly longer status messages display time
set -g display-time 1000
# redraw status line every 10 seconds
set -g status-interval 10
# reduce escape time
set -s escape-time 10
# increase history
set-option -g history-limit 10000

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U

# copy to Wayland clipboard
if -b 'command -v wl-copy > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | wl-copy"'
# copy to macOS clipboard
if -b 'command -v pbcopy > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | pbcopy"'
if -b 'command -v reattach-to-user-namespace > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | reattach-to-user-namespace pbcopy"'
# copy to Windows clipboard
if -b 'command -v clip.exe > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | clip.exe"'
if -b '[ -c /dev/clipboard ]' 'bind y run -b "tmux save-buffer - > /dev/clipboard"'

# unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# set -g status-style bg='#0d1117',fg=cyan
set -g status-style bg=color233,fg=color75

# tmux-sessionizer
# Running tms will find the repos and fuzzy find on them.
bind C-o display-popup -E "tms"
# Show other active sessions with a fuzzy finder and a preview window.
bind C-j display-popup -E "tms switch"
# Show other active windows in the current session with a fuzzy finder and a preview window.
bind C-k display-popup -E "tms windows"
# The 'tms sessions' command can be used to get a styled output of the active
# sessions with an asterisk on the current session.
set -g status-right " #(tms sessions)"
# If this configuration is used it can be helpful to rebind the default tmux keys for switching sessions
# so that the status bar is refreshed on every session switch.
bind -r '(' switch-client -p\; refresh-client -S
bind -r ')' switch-client -n\; refresh-client -S
# Using this command you can automatically rename the active session along with the directory name
# and the active directory inside all the panes in the active session will be changed to the renamed directory
bind C-w command-prompt -p "Rename active session to: " "run-shell 'tms rename %1'"
# Using this command you can automatically generate missing worktree windows for
# the active session or a provided session_name.
bind C-r "run-shell 'tms refresh'"

# tpm plugin
# Check if TPM is installed
if-shell "test ! -d $XDG_DATA_HOME/tmux/plugins/tpm" "run-shell 'git clone https://github.com/tmux-plugins/tpm $XDG_DATA_HOME/tmux/plugins/tpm'"

set -g @plugin 'tmux-plugins/tpm'

# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'

# set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

unbind C-s

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugins"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run-shell "$XDG_CONFIG_HOME/tmux/scripts/bootstrap_tpm.sh"
run "$XDG_DATA_HOME/tmux/plugins/tpm/tpm"

# Set the theme.
# run-shell "$XDG_CONFIG_HOME/tmux/scripts/toggle_theme.sh ON"

# ==============================================
# ===   Nesting local and remote sessions     ===
# ==============================================
# see: toggle on/off all keybindings · Issue #237 · tmux/tmux - https://github.com/tmux/tmux/issues/237
# Also, change some visual styles when window keys are off
bind -T root F12  \
    set prefix None \;\
    set key-table off \;\
    set status-style "bg=color233,fg=color11" \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

