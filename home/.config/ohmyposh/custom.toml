version = 3
final_space = true
shell_integration = true

[[blocks]]
type = "rprompt"

[[blocks.segments]]
foreground = "#00C5C7"
style = "plain"
template = " {{ .CurrentDate | date .Format }} "
type = "time"

[blocks.segments.properties]
time_format = "15:04:05"

[[blocks]]
alignment = "left"
type = "prompt"

[[blocks.segments]]
foreground = "#77E4F7"
style = "plain"
template = "{{ .Path }} "
type = "path"

[blocks.segments.properties]
style = "full"

[[blocks.segments]]
foreground = "#FFE700"
style = "plain"
template = "{{ .HEAD }} "
type = "git"

[[blocks.segments]]
foreground = "#43D426"
style = "plain"
template = "❯ "
type = "text"
