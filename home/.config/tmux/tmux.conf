# ==============================================
# ===   Theme Configuration                  ===
# ==============================================
# Status bar
set -g status-style bg='#1e1e2e',fg='#89b4fa'

# Pane borders
set -g pane-border-style fg='#45475a'
set -g pane-active-border-style fg='#89b4fa'

# Window status
set -g window-status-style fg='#a6adc8',bg='#1e1e2e'
set -g window-status-current-style fg='#cdd6f4',bg='#313244',bold
set -g window-status-activity-style fg='#f5c2e7',bg='#1e1e2e'
set -g window-status-bell-style fg='#f9e2af',bg='#1e1e2e'

# Message and command line
set -g message-style fg='#cdd6f4',bg='#313244'
set -g message-command-style fg='#cdd6f4',bg='#313244'

# Clock mode
set -g clock-mode-colour '#89b4fa'

# Copy mode
set -g mode-style fg='#1e1e2e',bg='#cba6f7'

# tmux-sessionizer
# Running tms will find the repos and fuzzy find on them.
bind C-o display-popup -E "tms"
# Show other active sessions with a fuzzy finder and a preview window.
bind C-j display-popup -E "tms switch"
# Show other active windows in the current session with a fuzzy finder and a preview window.
bind C-k display-popup -E "tms windows"
# The 'tms sessions' command can be used to get a styled output of the active
# sessions with an asterisk on the current session.
set -g status-right " #(tms sessions)"
# If this configuration is used it can be helpful to rebind the default tmux keys for switching sessions
# so that the status bar is refreshed on every session switch.
bind -r '(' switch-client -p\; refresh-client -S
bind -r ')' switch-client -n\; refresh-client -S
# Using this command you can automatically rename the active session along with the directory name
# and the active directory inside all the panes in the active session will be changed to the renamed directory
bind C-w command-prompt -p "Rename active session to: " "run-shell 'tms rename %1'"
# Using this command you can automatically generate missing worktree windows for
# the active session or a provided session_name.
bind C-r "run-shell 'tms refresh'"

# tpm plugin
# Check if TPM is installed
if-shell "test ! -d $XDG_DATA_HOME/tmux/plugins/tpm" "run-shell 'git clone https://github.com/tmux-plugins/tpm $XDG_DATA_HOME/tmux/plugins/tpm'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-copycat'

unbind C-s

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugins"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run-shell "$XDG_CONFIG_HOME/tmux/scripts/bootstrap_tpm.sh"
run "$XDG_DATA_HOME/tmux/plugins/tpm/tpm"

# Set the theme.
# run-shell "$XDG_CONFIG_HOME/tmux/scripts/toggle_theme.sh ON"

# ==============================================
# ===   Nesting local and remote sessions     ===
# ==============================================
# see: toggle on/off all keybindings · Issue #237 · tmux/tmux - https://github.com/tmux/tmux/issues/237
# Also, change some visual styles when window keys are off
bind -T root F12  \
    set prefix None \;\
    set key-table off \;\
    set status-style "bg=#1e1e2e,fg=#f9e2af" \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

