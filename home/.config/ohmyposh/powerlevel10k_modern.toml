version = 3

[[blocks]]
alignment = "left"
type = "prompt"

[[blocks.segments]]
background = "#ffffff"
foreground = "#000000"
leading_diamond = ""
style = "diamond"
template = " {{ if .WSL }}WSL at {{ end }}{{.Icon}} "
trailing_diamond = ""
type = "os"

[[blocks.segments]]
background = "#0000ff"
foreground = "#000000"
powerline_symbol = ""
style = "powerline"
template = "  "
type = "root"

[blocks.segments.properties]
style = "full"

[[blocks.segments]]
background = "#0000ff"
foreground = "#ffffff"
powerline_symbol = ""
style = "powerline"
template = " {{ .Path }} "
type = "path"

[blocks.segments.properties]
style = "full"

[[blocks.segments]]
background = "#D4E157"
foreground = "#000000"
powerline_symbol = ""
style = "powerline"
template = " {{ .HEAD }} "
type = "git"

[[blocks]]
alignment = "right"
type = "prompt"

[[blocks.segments]]
background = "#D4E157"
foreground = "#000000"
leading_diamond = ""
style = "diamond"
template = " {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }} <transparent></>"
type = "python"

[[blocks.segments]]
background = "#7FD5EA"
foreground = "#ffffff"
leading_diamond = ""
style = "diamond"
template = " {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} <transparent></>"
type = "go"

[[blocks.segments]]
background = "#ffffff"
foreground = "#000000"
leading_diamond = ""
style = "diamond"
template = " {{ .CurrentDate | date .Format }} "
trailing_diamond = ""
type = "time"

[blocks.segments.properties]
time_format = "15:04:05"

[[blocks]]
alignment = "left"
newline = true
type = "prompt"

[[blocks.segments]]
foreground = "#D4E157"
foreground_templates = ["{{ if gt .Code 0 }}#FF5252{{ end }}"]
style = "plain"
template = "❯ "
type = "status"

[blocks.segments.properties]
always_enabled = true
