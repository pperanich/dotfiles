# Hyprland Configuration

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT

# Execute programs at launch
exec-once = waybar
exec-once = mako
exec-once = swww init
exec-once = kanshi

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Configure window decorations
general {
    gaps_in = 6
    gaps_out = 6
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

# Configure animations
animations {
    enabled = yes

    # Default animations
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Configure input behavior
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = yes
    }
}

# Configure Dwindle layout
dwindle {
    pseudotile = yes
    preserve_split = yes
    no_gaps_when_only = false
}

# Configure Master layout
master {
    new_is_master = true
    mfact = 0.5
}

# Configure decoration properties
decoration {
    rounding = 10
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
    
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = on
    }
}

# Configure window behavior
gestures {
    workspace_swipe = on
}

misc {
    force_default_wallpaper = -1 # Set to 0 to disable the anime mascot wallpapers
}

# Window rules
windowrule = float, ^(System Settings)$
windowrule = float, ^(System Information)$
windowrule = float, ^(System Preferences)$
windowrule = float, title:^(Settings)$
windowrule = float, title:^(Preferences)$

# Workspace assignments (based on your Yabai config)
windowrule = workspace 1, ^(Microsoft Outlook)$
windowrule = workspace 2, ^(Slack)$
windowrule = workspace 3, ^(firefox|chromium)$
windowrule = workspace 4, ^(Alacritty)$
windowrule = workspace 5, ^(code)$
windowrule = workspace 6, ^(obsidian)$
windowrule = workspace 7, ^(discord|element)$
windowrule = workspace 8, ^(zoom)$

# Key bindings based on your SKHD configuration
# Basic application bindings
bind = $mainMod, A, exec, alacritty
bind = $mainMod, C, exec, code
bind = $mainMod, S, exec, slack
bind = $mainMod, W, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Window management
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

# Workspace management
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Quick workspace switching
bind = CTRL $mainMod, left, workspace, -1
bind = CTRL $mainMod, right, workspace, +1

# Go back to previous workspace (alt + b from SKHD)
bind = $mainMod, B, workspace, previous

# Resize windows
bind = $mainMod SHIFT, A, resizeactive, -20 0
bind = $mainMod SHIFT, S, resizeactive, 0 20
bind = $mainMod SHIFT, W, resizeactive, 0 -20
bind = $mainMod SHIFT, D, resizeactive, 20 0

# Toggle floating
bind = $mainMod SHIFT, SPACE, togglefloating

# Layout switching
bind = $mainMod, E, togglesplit, # toggle split direction
bind = $mainMod SHIFT, E, exec, hyprctl keyword dwindle:no_gaps_when_only true # simulate floating layout

# Special keys for volume
bindel =, XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel =, XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel =, XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Special keys for brightness
bindel =, XF86MonBrightnessUp, exec, light -A 10
bindel =, XF86MonBrightnessDown, exec, light -U 10

# Screenshot
bind =, Print, exec, grim
bind = SHIFT, Print, exec, grim -g "$(slurp)" 